<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>INS Education Demo</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:10px;
}

.panel{
border:1px solid #aaa;
padding:10px;
margin:5px;
display:inline-block;
}

canvas{
border:1px solid black;
margin-top:10px;
}

input{
width:80px;
}

</style>

</head>

<body>

<h2>Smartphone INS Demo</h2>

<button id="start">Start Sensor</button> <button id="reset">Reset</button> <button id="zupt">ZUPT OFF</button>

<br><br>

<div class="panel">
<h3>Acceleration</h3>
ax : <span id="ax">0</span><br>
ay : <span id="ay">0</span>
</div>

<div class="panel">
<h3>Velocity</h3>
vx : <span id="vx">0</span><br>
vy : <span id="vy">0</span>
</div>

<div class="panel">
<h3>Position</h3>
x : <span id="px">0</span><br>
y : <span id="py">0</span>
</div>

<br>

<div class="panel">
<h3>Attitude</h3>
roll : <span id="roll">0</span><br>
pitch : <span id="pitch">0</span><br>
yaw : <span id="yaw">0</span>
</div>

<br>

<div class="panel">
<h3>Filter Settings</h3>

Acceleration Threshold<br> <input id="acc_th" type="number" value="0.03" step="0.01"><br><br>

Velocity Threshold<br> <input id="vel_th" type="number" value="0.02" step="0.01"><br><br>

LPF (0-1)<br> <input id="lpf" type="number" value="0.2" step="0.05">

</div>

<br>

<canvas id="map"></canvas>

<script>

let vx=0
let vy=0
let px=0
let py=0

let ax_f=0
let ay_f=0

let lastTime=null

let zupt=false

const ax_text=document.getElementById("ax")
const ay_text=document.getElementById("ay")

const vx_text=document.getElementById("vx")
const vy_text=document.getElementById("vy")

const px_text=document.getElementById("px")
const py_text=document.getElementById("py")

const roll_text=document.getElementById("roll")
const pitch_text=document.getElementById("pitch")
const yaw_text=document.getElementById("yaw")

const acc_th=document.getElementById("acc_th")
const vel_th=document.getElementById("vel_th")
const lpf_box=document.getElementById("lpf")

const canvas=document.getElementById("map")

let size=Math.min(window.innerWidth*0.9,400)
canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

let cx=size/2
let cy=size/2

let path=[]

let roll=0
let pitch=0
let yaw=0

function draw(){

ctx.clearRect(0,0,size,size)

ctx.beginPath()

for(let i=0;i<path.length;i++){

let x=cx+path[i][0]*20
let y=cy+path[i][1]*20

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.stroke()

ctx.beginPath()
ctx.arc(cx+px*20,cy+py*20,5,0,Math.PI*2)
ctx.fill()

}

function updateDisplay(ax,ay){

ax_text.textContent=ax.toFixed(3)
ay_text.textContent=ay.toFixed(3)

vx_text.textContent=vx.toFixed(3)
vy_text.textContent=vy.toFixed(3)

px_text.textContent=px.toFixed(3)
py_text.textContent=py.toFixed(3)

roll_text.textContent=roll.toFixed(1)
pitch_text.textContent=pitch.toFixed(1)
yaw_text.textContent=yaw.toFixed(1)

draw()

}

function handleOrientation(e){

roll=e.gamma||0
pitch=e.beta||0
yaw=e.alpha||0

}

function handleMotion(e){

let ax=e.accelerationIncludingGravity.x||0
let ay=e.accelerationIncludingGravity.y||0
let az=e.accelerationIncludingGravity.z||0

let g=9.81

let pitch_r=pitch*Math.PI/180
let roll_r=roll*Math.PI/180

let gx=g*Math.sin(pitch_r)
let gy=-g*Math.sin(roll_r)

ax=ax-gx
ay=ay-gy

let acc_threshold=parseFloat(acc_th.value)
let vel_threshold=parseFloat(vel_th.value)
let alpha=parseFloat(lpf_box.value)

if(Math.abs(ax)<acc_threshold) ax=0
if(Math.abs(ay)<acc_threshold) ay=0

ax_f=ax_f*(1-alpha)+ax*alpha
ay_f=ay_f*(1-alpha)+ay*alpha

let now=Date.now()

if(!lastTime){
lastTime=now
return
}

let dt=(now-lastTime)/1000
lastTime=now

vx+=ax_f*dt
vy+=ay_f*dt

if(Math.abs(vx)<vel_threshold) vx=0
if(Math.abs(vy)<vel_threshold) vy=0

if(zupt){

if(Math.abs(ax_f)<0.02 && Math.abs(ay_f)<0.02){

vx=0
vy=0

}

}

px+=vx*dt
py+=vy*dt

path.push([px,py])

updateDisplay(ax_f,ay_f)

}

document.getElementById("start").onclick=async function(){

if(typeof DeviceMotionEvent.requestPermission==="function"){

let permission=await DeviceMotionEvent.requestPermission()

if(permission!=="granted"){
alert("Permission denied")
return
}

}

window.addEventListener("devicemotion",handleMotion)
window.addEventListener("deviceorientation",handleOrientation)

}

document.getElementById("reset").onclick=function(){

vx=0
vy=0
px=0
py=0
path=[]
lastTime=null

}

document.getElementById("zupt").onclick=function(){

zupt=!zupt

if(zupt){
this.textContent="ZUPT ON"
}else{
this.textContent="ZUPT OFF"
}

}

</script>

</body>
</html>
