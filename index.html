<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>INS Education Demo</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

.panel{
margin:10px;
padding:10px;
border:1px solid #aaa;
display:inline-block;
}

canvas{
border:1px solid black;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Smartphone INS Education Demo</h1>

<button id="start">Start Sensor</button> <button id="reset">Reset</button> <button id="zupt">ZUPT OFF</button>

<br><br>

<div class="panel">
<h3>Acceleration</h3>
ax : <span id="ax">0</span><br>
ay : <span id="ay">0</span>
</div>

<div class="panel">
<h3>Velocity</h3>
vx : <span id="vx">0</span><br>
vy : <span id="vy">0</span>
</div>

<div class="panel">
<h3>Position</h3>
x : <span id="px">0</span><br>
y : <span id="py">0</span>
</div>

<br>

<div class="panel">
<h3>Deadband Threshold</h3>
<input type="range" id="threshold" min="0" max="0.3" step="0.005" value="0">
<br>
<span id="threshold_value">0</span> m/s²
</div>

<div class="panel">
<h3>Low Pass Filter</h3>
<input type="range" id="lpf" min="0" max="1" step="0.01" value="0">
<br>
<span id="lpf_value">0</span>
</div>

<br>

<canvas id="map" width="400" height="400"></canvas>

<script>

let vx=0
let vy=0
let px=0
let py=0

let lastTime=null

let ax_f=0
let ay_f=0

let zupt=false

const ax_text=document.getElementById("ax")
const ay_text=document.getElementById("ay")

const vx_text=document.getElementById("vx")
const vy_text=document.getElementById("vy")

const px_text=document.getElementById("px")
const py_text=document.getElementById("py")

const threshold_slider=document.getElementById("threshold")
const threshold_value=document.getElementById("threshold_value")

const lpf_slider=document.getElementById("lpf")
const lpf_value=document.getElementById("lpf_value")

const canvas=document.getElementById("map")
const ctx=canvas.getContext("2d")

let cx=200
let cy=200

let path=[]

function draw(){

ctx.clearRect(0,0,400,400)

ctx.beginPath()

for(let i=0;i<path.length;i++){

let x=cx+path[i][0]*20
let y=cy+path[i][1]*20

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

}

ctx.stroke()

ctx.beginPath()
ctx.arc(cx+px*20,cy+py*20,5,0,Math.PI*2)
ctx.fill()

}

function updateDisplay(ax,ay){

ax_text.textContent=ax.toFixed(3)
ay_text.textContent=ay.toFixed(3)

vx_text.textContent=vx.toFixed(3)
vy_text.textContent=vy.toFixed(3)

px_text.textContent=px.toFixed(3)
py_text.textContent=py.toFixed(3)

threshold_value.textContent=parseFloat(threshold_slider.value).toFixed(3)
lpf_value.textContent=parseFloat(lpf_slider.value).toFixed(2)

draw()

}

function handleMotion(e){

let ax=e.acceleration.x||0
let ay=e.acceleration.y||0

let threshold=parseFloat(threshold_slider.value)
let alpha=parseFloat(lpf_slider.value)

if(Math.abs(ax)<threshold) ax=0
if(Math.abs(ay)<threshold) ay=0

ax_f=ax_f*(1-alpha)+ax*alpha
ay_f=ay_f*(1-alpha)+ay*alpha

let now=Date.now()

if(!lastTime){
lastTime=now
return
}

let dt=(now-lastTime)/1000
lastTime=now

vx+=ax_f*dt
vy+=ay_f*dt

if(zupt){

if(Math.abs(ax_f)<0.02 && Math.abs(ay_f)<0.02){

vx=0
vy=0

}

}

px+=vx*dt
py+=vy*dt

path.push([px,py])

updateDisplay(ax_f,ay_f)

}

document.getElementById("start").onclick=async function(){

if(typeof DeviceMotionEvent.requestPermission==="function"){

let permission=await DeviceMotionEvent.requestPermission()

if(permission!=="granted"){
alert("Permission denied")
return
}

}

window.addEventListener("devicemotion",handleMotion)

}

document.getElementById("reset").onclick=function(){

vx=0
vy=0
px=0
py=0
path=[]
lastTime=null

}

document.getElementById("zupt").onclick=function(){

zupt=!zupt

if(zupt){

this.textContent="ZUPT ON"

}else{

this.textContent="ZUPT OFF"

}

}

</script>

</body>
</html>
